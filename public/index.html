<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON DISTRICT SHOOTER // MULTIPLAYER</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
    
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      background:#04010a; 
      overflow:hidden; 
      font-family:'Orbitron',monospace;
      color:#00ffcc;
    }
    
    #game-canvas {
      display:block;
      background:#04010a;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
    }
    
    /* Join Screen */
    #join-screen {
      position:absolute;
      inset:0;
      background:rgba(4,1,10,0.98);
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      z-index:100;
      backdrop-filter:blur(10px);
    }
    #join-screen.hidden { display:none; }
    
    .join-title {
      font-size:48px;
      font-weight:900;
      color:#00ffcc;
      text-shadow:0 0 40px #00ffcc;
      letter-spacing:0.2em;
      margin-bottom:20px;
    }
    .join-subtitle {
      font-size:14px;
      color:rgba(0,255,204,0.6);
      letter-spacing:0.15em;
      margin-bottom:40px;
    }
    #player-name-input {
      font-family:'Orbitron',monospace;
      font-size:18px;
      padding:15px 30px;
      background:rgba(0,255,204,0.1);
      border:2px solid #00ffcc;
      color:#00ffcc;
      text-align:center;
      letter-spacing:0.1em;
      margin-bottom:20px;
      width:300px;
    }
    #player-name-input::placeholder { color:rgba(0,255,204,0.3); }
    #join-btn {
      font-family:'Orbitron',monospace;
      font-size:16px;
      font-weight:700;
      padding:15px 50px;
      background:#00ffcc;
      border:none;
      color:#04010a;
      cursor:pointer;
      letter-spacing:0.15em;
      transition:all 0.2s;
    }
    #join-btn:hover {
      background:#00ffe6;
      transform:scale(1.05);
      box-shadow:0 0 30px rgba(0,255,204,0.5);
    }
    
    /* HUD */
    #hud {
      position:absolute;
      top:20px;
      left:20px;
      font-size:12px;
      color:#00ffcc;
      text-shadow:0 0 10px rgba(0,255,204,0.5);
      letter-spacing:0.1em;
      z-index:10;
    }
    .hud-item {
      margin-bottom:8px;
      background:rgba(4,1,10,0.7);
      padding:8px 15px;
      border-left:3px solid #00ffcc;
    }
    
    /* Health Bar */
    #health-bar-container {
      position:absolute;
      bottom:30px;
      left:50%;
      transform:translateX(-50%);
      width:300px;
      z-index:10;
    }
    #health-bar-bg {
      width:100%;
      height:25px;
      background:rgba(4,1,10,0.8);
      border:2px solid #00ffcc;
      border-radius:3px;
      overflow:hidden;
    }
    #health-bar-fill {
      height:100%;
      background:linear-gradient(90deg, #00ffcc, #00ff88);
      transition:width 0.3s;
      box-shadow:0 0 15px rgba(0,255,204,0.6);
    }
    #health-text {
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      font-size:12px;
      font-weight:700;
      color:#04010a;
      mix-blend-mode:difference;
      letter-spacing:0.1em;
    }
    
    /* Leaderboard */
    #leaderboard {
      position:absolute;
      top:20px;
      right:20px;
      width:250px;
      background:rgba(4,1,10,0.85);
      border:2px solid #00ffcc;
      border-radius:5px;
      padding:15px;
      z-index:10;
    }
    .lb-title {
      font-size:14px;
      font-weight:900;
      color:#00ffcc;
      text-align:center;
      margin-bottom:12px;
      letter-spacing:0.15em;
      text-shadow:0 0 15px rgba(0,255,204,0.7);
    }
    .lb-player {
      display:flex;
      justify-content:space-between;
      font-size:11px;
      padding:6px 0;
      border-bottom:1px solid rgba(0,255,204,0.2);
    }
    .lb-player.me {
      background:rgba(0,255,204,0.15);
      padding:6px 8px;
      margin:0 -8px;
    }
    .lb-rank { color:rgba(0,255,204,0.5); width:25px; }
    .lb-name { flex:1; color:#00ffcc; }
    .lb-score { color:#00ff88; font-weight:700; }
    
    /* Death Screen */
    #death-screen {
      position:absolute;
      inset:0;
      background:rgba(4,1,10,0.95);
      display:none;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      z-index:50;
    }
    #death-screen.show { display:flex; }
    .death-title {
      font-size:42px;
      font-weight:900;
      color:#ff2d78;
      text-shadow:0 0 40px #ff2d78;
      letter-spacing:0.2em;
      margin-bottom:20px;
    }
    .death-stats {
      font-size:16px;
      color:rgba(255,45,120,0.8);
      margin-bottom:30px;
    }
    #respawn-btn {
      font-family:'Orbitron',monospace;
      font-size:16px;
      font-weight:700;
      padding:15px 50px;
      background:#00ffcc;
      border:none;
      color:#04010a;
      cursor:pointer;
      letter-spacing:0.15em;
      transition:all 0.2s;
    }
    #respawn-btn:hover {
      background:#00ffe6;
      transform:scale(1.05);
    }
    
    /* Kill Feed */
    #kill-feed {
      position:absolute;
      top:20px;
      left:50%;
      transform:translateX(-50%);
      width:400px;
      z-index:10;
    }
    .kill-msg {
      background:rgba(4,1,10,0.85);
      border:1px solid rgba(255,45,120,0.5);
      padding:8px 15px;
      margin-bottom:5px;
      font-size:11px;
      text-align:center;
      color:#ff2d78;
      letter-spacing:0.08em;
      animation:killFade 3s ease forwards;
    }
    @keyframes killFade {
      0% { opacity:1; transform:translateY(0); }
      70% { opacity:1; }
      100% { opacity:0; transform:translateY(-20px); }
    }
    
    @keyframes powerupPop {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.3); }
      100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); }
    }
    
    @keyframes streakPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    
    @keyframes levelUpAnim {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.5); }
      100% { opacity: 0; transform: translate(-50%, -100%) scale(0.5); }
    }
    
    @keyframes missionComplete {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      10% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
      90% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
    }
    
    @keyframes nukeBlast {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
      80% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
    }
    
    /* Connection Status */
    #connection-status {
      position:absolute;
      bottom:20px;
      right:20px;
      font-size:10px;
      padding:6px 12px;
      background:rgba(4,1,10,0.8);
      border:1px solid #00ffcc;
      border-radius:3px;
      z-index:10;
    }
    #connection-status.disconnected {
      border-color:#ff2d78;
      color:#ff2d78;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  
  <!-- Join Screen -->
  <div id="join-screen">
    <div class="join-title">NEON DISTRICT</div>
    <div class="join-subtitle">MULTIPLAYER ARENA // 2157</div>
    <input type="text" id="player-name-input" placeholder="ENTER CALLSIGN" maxlength="15" />
    <button id="join-btn">⚡ JOIN BATTLE</button>
  </div>
  
  <!-- HUD -->
  <div id="hud">
    <div class="hud-item">KILLS: <span id="kills-display">0</span></div>
    <div class="hud-item">SCORE: <span id="score-display">0</span></div>
    <div class="hud-item">POWER: <span id="power-display">1</span></div>
    <div class="hud-item">XP: <span id="xp-display">0</span>/100</div>
    <div class="hud-item">SHIELD: <span id="shield-display">0</span></div>
    <div class="hud-item">ARMOR: <span id="armor-display">0</span></div>
    <div class="hud-item">MULTISHOT: <span id="multishot-display">1</span>x</div>
    <div class="hud-item" id="killstreak-hud" style="display:none; border-left-color:#ff6600; background:rgba(255,102,0,0.1);">
      🔥 STREAK: <span id="killstreak-display">0</span>
    </div>
  </div>
  
  <!-- Health Bar -->
  <div id="health-bar-container">
    <div id="health-bar-bg">
      <div id="health-bar-fill" style="width:100%"></div>
    </div>
    <div id="health-text">100 / 100</div>
  </div>
  
  <!-- Leaderboard -->
  <div id="leaderboard">
    <div class="lb-title">🏆 TOP PLAYERS</div>
    <div id="leaderboard-list"></div>
  </div>
  
  <!-- Kill Feed -->
  <div id="kill-feed"></div>
  
  <!-- Death Screen -->
  <div id="death-screen">
    <div class="death-title">ELIMINATED</div>
    <div class="death-stats" id="death-stats-text"></div>
    <button id="respawn-btn">⚡ RESPAWN</button>
  </div>
  
  <!-- Kill Streak Announcement -->
  <div id="kill-streak-announcement" style="display:none; position:absolute; top:30%; left:50%; transform:translate(-50%, -50%); z-index:200; text-align:center;">
    <div id="streak-title" style="font-size:64px; font-weight:900; text-shadow:0 0 60px currentColor; letter-spacing:0.2em; animation:streakPulse 0.5s ease;"></div>
    <div id="streak-subtitle" style="font-size:24px; margin-top:15px; opacity:0.8;"></div>
  </div>
  
  <!-- Account Level Display -->
  <div id="account-level" style="position:absolute; top:20px; left:50%; transform:translateX(-50%); background:rgba(4,1,10,0.9); padding:10px 25px; border:2px solid #00ffcc; border-radius:5px; z-index:10;">
    <div style="font-size:11px; color:rgba(0,255,204,0.6); text-align:center; letter-spacing:0.1em;">ACCOUNT LEVEL</div>
    <div style="font-size:24px; font-weight:900; color:#00ffcc; text-align:center; text-shadow:0 0 20px #00ffcc;" id="account-level-num">1</div>
    <div id="account-xp-bar" style="width:200px; height:6px; background:rgba(0,255,204,0.2); margin-top:5px; border-radius:3px; overflow:hidden;">
      <div id="account-xp-fill" style="width:0%; height:100%; background:linear-gradient(90deg, #00ffcc, #00ff88); transition:width 0.3s;"></div>
    </div>
    <div style="font-size:9px; color:rgba(0,255,204,0.5); text-align:center; margin-top:3px;" id="account-xp-text">0 / 1000 XP</div>
  </div>
  
  <!-- Daily Missions Panel -->
  <div id="missions-panel" style="position:absolute; bottom:120px; left:20px; width:300px; background:rgba(4,1,10,0.9); border:2px solid #00ffcc; border-radius:5px; padding:15px; z-index:10;">
    <div style="font-size:14px; font-weight:900; color:#00ffcc; margin-bottom:12px; text-shadow:0 0 15px #00ffcc; letter-spacing:0.1em;">📋 DAILY MISSIONS</div>
    <div id="missions-list"></div>
    <div style="font-size:9px; color:rgba(0,255,204,0.5); margin-top:10px; text-align:center;" id="missions-reset">Resets in: 23:59:59</div>
  </div>
  
  <!-- Skin Selector Button -->
  <div id="skin-btn" onclick="toggleSkinSelector()" style="position:absolute; bottom:20px; left:20px; padding:12px 20px; background:#00ffcc; color:#04010a; font-weight:700; font-size:12px; cursor:pointer; letter-spacing:0.1em; transition:all 0.2s; border-radius:3px;">
    🎨 SKINS
  </div>
  
  <!-- Skin Selector Modal -->
  <div id="skin-modal" style="display:none; position:absolute; inset:0; background:rgba(4,1,10,0.95); z-index:150; padding:50px;">
    <div style="max-width:800px; margin:0 auto;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <div style="font-size:32px; font-weight:900; color:#00ffcc; text-shadow:0 0 30px #00ffcc;">🎨 SHIP SKINS</div>
        <button onclick="toggleSkinSelector()" style="padding:10px 20px; background:rgba(255,45,120,0.2); border:2px solid #ff2d78; color:#ff2d78; font-family:Orbitron; font-weight:700; cursor:pointer;">CLOSE</button>
      </div>
      <div id="skins-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:15px;"></div>
    </div>
  </div>
  
  <!-- Connection Status -->
  <div id="connection-status">● CONNECTED</div>
  
  <script src="/socket.io/socket.io.js"></script>
  <script>
// MULTIPLAYER CLIENT
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Game state
let socket = null;
let myPlayerId = null;
let players = new Map();
let bullets = new Map();
let powerups = new Map();
let worldSize = 10000;
let cameraX = 0, cameraY = 0;

// Visual effects
const bgStars = [];
const nebulae = [];
const particles = [];
const playerTrails = new Map();
let screenShake = 0;
let chromatic = 0;
let hueShift = 0;

// ADDICTION SYSTEMS
// Account progression
let accountData = {
  level: 1,
  xp: 0,
  totalKills: 0,
  totalDeaths: 0,
  bestStreak: 0,
  gamesPlayed: 0
};

// Sound system
let audioContext = null;
let soundEnabled = true;

// Daily missions
let dailyMissions = [];
let missionProgress = {};

// Skins system
let availableSkins = [
  { id: 'default', name: 'Default', color: '#00ffcc', unlockLevel: 1 },
  { id: 'fire', name: 'Fire Trail', color: '#ff6600', unlockLevel: 3 },
  { id: 'ice', name: 'Ice Crystal', color: '#00ccff', unlockLevel: 5 },
  { id: 'void', name: 'Void Shadow', color: '#aa00ff', unlockLevel: 8 },
  { id: 'rainbow', name: 'Rainbow', color: 'rainbow', unlockLevel: 10 },
  { id: 'pink', name: 'Neon Pink', color: '#ff00aa', unlockLevel: 15 },
  { id: 'gold', name: 'Gold Rush', color: '#ffaa00', unlockLevel: 20 },
  { id: 'toxic', name: 'Toxic Green', color: '#66ff00', unlockLevel: 25 },
  { id: 'space', name: 'Deep Space', color: '#0044aa', unlockLevel: 30 },
  { id: 'plasma', name: 'Plasma', color: '#00aaff', unlockLevel: 40 },
  { id: 'legendary', name: 'Legendary', color: 'gradient', unlockLevel: 50 }
];
let equippedSkin = 'default';
let sessionStats = {
  kills: 0,
  deaths: 0,
  powerupsCollected: 0,
  survivalTime: 0,
  maxStreak: 0
};

// ═══════════════════════════════════════════
//  ADDICTION SYSTEMS
// ═══════════════════════════════════════════

// Account System - localStorage
function loadAccountData() {
  const saved = localStorage.getItem('neonAccountData');
  if (saved) {
    accountData = JSON.parse(saved);
  }
  updateAccountDisplay();
}

function saveAccountData() {
  localStorage.setItem('neonAccountData', JSON.stringify(accountData));
}

function addAccountXP(amount) {
  accountData.xp += amount;
  const xpNeeded = accountData.level * 1000;
  
  while (accountData.xp >= xpNeeded) {
    accountData.xp -= xpNeeded;
    accountData.level++;
    playSound('levelup');
    showLevelUpNotification();
  }
  
  updateAccountDisplay();
  saveAccountData();
}

function updateAccountDisplay() {
  const xpNeeded = accountData.level * 1000;
  const xpPct = (accountData.xp / xpNeeded) * 100;
  
  document.getElementById('account-level-num').textContent = accountData.level;
  document.getElementById('account-xp-fill').style.width = xpPct + '%';
  document.getElementById('account-xp-text').textContent = `${accountData.xp} / ${xpNeeded} XP`;
}

function showLevelUpNotification() {
  const notif = document.createElement('div');
  notif.style.cssText = 'position:absolute; top:20%; left:50%; transform:translate(-50%,-50%); font-size:48px; font-weight:900; color:#00ffcc; text-shadow:0 0 40px #00ffcc; z-index:200; animation:levelUpAnim 2s ease forwards;';
  notif.textContent = `LEVEL ${accountData.level}!`;
  document.body.appendChild(notif);
  setTimeout(() => notif.remove(), 2000);
  
  // Check for new skin unlocks
  checkSkinUnlocks();
}

// Sound System
function initSoundSystem() {
  try {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  } catch (e) {
    console.log('Web Audio API not supported');
    soundEnabled = false;
  }
}

function playSound(type) {
  if (!soundEnabled || !audioContext) return;
  
  const ctx = audioContext;
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  
  osc.connect(gain);
  gain.connect(ctx.destination);
  
  switch(type) {
    case 'shoot':
      osc.frequency.value = 440;
      osc.type = 'square';
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      osc.start(now);
      osc.stop(now + 0.1);
      break;
      
    case 'kill':
      osc.frequency.value = 100;
      osc.type = 'sawtooth';
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.start(now);
      osc.stop(now + 0.3);
      break;
      
    case 'death':
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.5);
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
      osc.start(now);
      osc.stop(now + 0.5);
      break;
      
    case 'powerup':
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
      osc.start(now);
      osc.stop(now + 0.2);
      break;
      
    case 'levelup':
      osc.frequency.setValueAtTime(523, now);
      osc.frequency.setValueAtTime(659, now + 0.1);
      osc.frequency.setValueAtTime(784, now + 0.2);
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      osc.start(now);
      osc.stop(now + 0.4);
      break;
      
    case 'streak':
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.exponentialRampToValueAtTime(800, now + 0.3);
      osc.type = 'sawtooth';
      gain.gain.setValueAtTime(0.25, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
      osc.start(now);
      osc.stop(now + 0.5);
      break;
  }
}

// Daily Missions System
function initDailyMissions() {
  const saved = localStorage.getItem('neonDailyMissions');
  const today = new Date().toDateString();
  
  if (saved) {
    const data = JSON.parse(saved);
    if (data.date === today) {
      dailyMissions = data.missions;
      missionProgress = data.progress || {};
      updateMissionsDisplay();
      return;
    }
  }
  
  // Generate new missions
  dailyMissions = [
    { id: 'm1', type: 'kills', target: 10, reward: 500, title: 'Get 10 Kills' },
    { id: 'm2', type: 'powerups', target: 20, reward: 300, title: 'Collect 20 Powerups' },
    { id: 'm3', type: 'survival', target: 300, reward: 400, title: 'Survive 5 Minutes' },
    { id: 'm4', type: 'streak', target: 3, reward: 600, title: 'Get a 3 Kill Streak' }
  ];
  
  missionProgress = { m1: 0, m2: 0, m3: 0, m4: 0 };
  saveDailyMissions();
  updateMissionsDisplay();
}

function saveDailyMissions() {
  localStorage.setItem('neonDailyMissions', JSON.stringify({
    date: new Date().toDateString(),
    missions: dailyMissions,
    progress: missionProgress
  }));
}

function updateMissionProgress(type, value) {
  dailyMissions.forEach(mission => {
    if (mission.type === type) {
      const oldProgress = missionProgress[mission.id];
      missionProgress[mission.id] = Math.min(mission.target, missionProgress[mission.id] + value);
      
      // Check if just completed
      if (oldProgress < mission.target && missionProgress[mission.id] >= mission.target) {
        addAccountXP(mission.reward);
        showMissionComplete(mission);
      }
    }
  });
  
  updateMissionsDisplay();
  saveDailyMissions();
}

function updateMissionsDisplay() {
  const html = dailyMissions.map(m => {
    const progress = missionProgress[m.id] || 0;
    const pct = (progress / m.target) * 100;
    const complete = progress >= m.target;
    
    return `<div style="margin-bottom:10px; padding:8px; background:rgba(0,255,204,0.05); border-radius:3px;">
      <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
        <span style="font-size:11px; color:${complete?'#00ff88':'#00ffcc'};">${complete?'✓':''} ${m.title}</span>
        <span style="font-size:10px; color:rgba(0,255,204,0.6);">+${m.reward} XP</span>
      </div>
      <div style="width:100%; height:4px; background:rgba(0,255,204,0.2); border-radius:2px; overflow:hidden;">
        <div style="width:${pct}%; height:100%; background:${complete?'#00ff88':'#00ffcc'}; transition:width 0.3s;"></div>
      </div>
      <div style="font-size:9px; color:rgba(0,255,204,0.5); margin-top:3px;">${progress} / ${m.target}</div>
    </div>`;
  }).join('');
  
  document.getElementById('missions-list').innerHTML = html;
}

function showMissionComplete(mission) {
  const notif = document.createElement('div');
  notif.style.cssText = 'position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); background:rgba(0,255,136,0.2); border:2px solid #00ff88; padding:20px 40px; border-radius:5px; z-index:200; animation:missionComplete 2s ease forwards;';
  notif.innerHTML = `
    <div style="font-size:24px; font-weight:900; color:#00ff88; text-shadow:0 0 20px #00ff88; margin-bottom:10px;">MISSION COMPLETE!</div>
    <div style="font-size:14px; color:#00ffcc;">${mission.title}</div>
    <div style="font-size:18px; color:#00ff88; margin-top:10px;">+${mission.reward} XP</div>
  `;
  document.body.appendChild(notif);
  playSound('levelup');
  setTimeout(() => notif.remove(), 2000);
}

// Skins System
function loadSkins() {
  const saved = localStorage.getItem('neonEquippedSkin');
  if (saved) {
    equippedSkin = saved;
  }
  updateSkinsGrid();
}

function checkSkinUnlocks() {
  updateSkinsGrid();
}

function equipSkin(skinId) {
  equippedSkin = skinId;
  localStorage.setItem('neonEquippedSkin', skinId);
  updateSkinsGrid();
}

function updateSkinsGrid() {
  const html = availableSkins.map(skin => {
    const unlocked = accountData.level >= skin.unlockLevel;
    const equipped = skin.id === equippedSkin;
    
    return `<div style="padding:15px; background:rgba(${equipped?'0,255,204':'255,255,255'},0.1); border:2px solid ${equipped?'#00ffcc':unlocked?'rgba(0,255,204,0.3)':'rgba(255,255,255,0.1)'}; border-radius:5px; text-align:center; cursor:${unlocked?'pointer':'not-allowed'}; transition:all 0.2s;" onclick="${unlocked?`equipSkin('${skin.id}')`:''}" ${unlocked?`onmouseover="this.style.borderColor='#00ffcc'" onmouseout="this.style.borderColor='${equipped?'#00ffcc':'rgba(0,255,204,0.3)}'"`:''}">
      <div style="width:60px; height:60px; margin:0 auto 10px; background:${skin.color==='rainbow'?'linear-gradient(45deg, red, yellow, lime, cyan, blue, magenta)':skin.color==='gradient'?'linear-gradient(45deg, #00ffcc, #ff00aa, #ffaa00)':skin.color}; border-radius:50%; ${unlocked?'':'filter:grayscale(100%); opacity:0.3;'}"></div>
      <div style="font-size:12px; color:${unlocked?'#00ffcc':'rgba(255,255,255,0.3)'}; font-weight:700; margin-bottom:5px;">${skin.name}</div>
      <div style="font-size:9px; color:rgba(0,255,204,0.5);">${unlocked?equipped?'EQUIPPED':'UNLOCKED':`Level ${skin.unlockLevel}`}</div>
    </div>`;
  }).join('');
  
  document.getElementById('skins-grid').innerHTML = html;
}

function toggleSkinSelector() {
  const modal = document.getElementById('skin-modal');
  modal.style.display = modal.style.display === 'none' ? 'flex' : 'none';
}

// Join game
document.getElementById('join-btn').addEventListener('click', joinGame);

});

function joinGame() {
  const name = document.getElementById('player-name-input').value.trim() || 'Anonymous';
  document.getElementById('join-screen').classList.add('hidden');
  connectToServer(name);
}

function connectToServer(playerName) {
  // Connect to server (change URL for production)
  const serverUrl = window.location.hostname === 'localhost' 
    ? 'http://localhost:3000' 
    : window.location.origin;
  
  socket = io(serverUrl);
  
  socket.on('connect', () => {
    console.log('Connected to server');
    document.getElementById('connection-status').textContent = '● CONNECTED';
    document.getElementById('connection-status').classList.remove('disconnected');
    socket.emit('join', { name: playerName });
  });
  
  socket.on('disconnect', () => {
    console.log('Disconnected from server');
    document.getElementById('connection-status').textContent = '● DISCONNECTED';
    document.getElementById('connection-status').classList.add('disconnected');
  });
  
  socket.on('init', (data) => {
    myPlayerId = data.playerId;
    worldSize = data.worldSize;
    console.log('Initialized as player:', myPlayerId);
  });
  
  socket.on('game_state', (data) => {
    // Update game state
    players.clear();
    data.players.forEach(p => players.set(p.id, p));
    
    bullets.clear();
    data.bullets.forEach(b => bullets.set(b.id, b));
    
    powerups.clear();
    data.powerups.forEach(p => powerups.set(p.id, p));
    
    // Update player trails
    players.forEach((p, id) => {
      if (!p.alive) return;
      
      if (!playerTrails.has(id)) {
        playerTrails.set(id, []);
      }
      
      const trail = playerTrails.get(id);
      trail.push({ x: p.x, y: p.y });
      
      // Keep trail length at 15 points
      if (trail.length > 15) {
        trail.shift();
      }
    });
    
    // Clean up trails for disconnected players
    playerTrails.forEach((trail, id) => {
      if (!players.has(id)) {
        playerTrails.delete(id);
      }
    });
    
    // Update HUD
    const me = players.get(myPlayerId);
    if (me) {
      document.getElementById('kills-display').textContent = me.kills;
      document.getElementById('score-display').textContent = me.score;
      document.getElementById('power-display').textContent = me.powerLevel;
      document.getElementById('xp-display').textContent = me.xp || 0;
      document.getElementById('shield-display').textContent = Math.floor(me.shield || 0);
      document.getElementById('armor-display').textContent = me.armor || 0;
      document.getElementById('multishot-display').textContent = me.multishot || 1;
      
      // Kill streak display
      const killStreak = me.killStreak || 0;
      const streakHud = document.getElementById('killstreak-hud');
      if (killStreak >= 3) {
        streakHud.style.display = 'block';
        document.getElementById('killstreak-display').textContent = killStreak;
      } else {
        streakHud.style.display = 'none';
      }
      
      // Track survival time for missions
      if (me.alive) {
        sessionStats.survivalTime++;
        if (sessionStats.survivalTime % 60 === 0) { // Every second
          updateMissionProgress('survival', 1);
        }
      }
      
      // Update health bar
      const healthPct = (me.health / me.maxHealth) * 100;
      document.getElementById('health-bar-fill').style.width = healthPct + '%';
      document.getElementById('health-text').textContent = Math.floor(me.health) + ' / ' + me.maxHealth;
      
      // Change health bar color based on shield/invincibility
      const fill = document.getElementById('health-bar-fill');
      if (me.invincible > 0) {
        fill.style.background = 'linear-gradient(90deg, #ffaa00, #ff6600)';
      } else if (me.shield > 0) {
        fill.style.background = 'linear-gradient(90deg, #00ccff, #0088ff)';
      } else {
        fill.style.background = 'linear-gradient(90deg, #00ffcc, #00ff88)';
      }
      
      // Update camera
      cameraX = me.x;
      cameraY = me.y;
    }
    
    // Update leaderboard
    updateLeaderboard();
  });
  
  socket.on('player_killed', (data) => {
    addKillMessage(data);
    
    // Check if we got the kill
    if (data.killerId === myPlayerId) {
      playSound('kill');
      sessionStats.kills++;
      sessionStats.maxStreak = Math.max(sessionStats.maxStreak, data.killStreak || 0);
      updateMissionProgress('kills', 1);
      addAccountXP(100);
      
      // Update kill streak mission
      if (data.killStreak >= 3) {
        updateMissionProgress('streak', 1);
      }
    }
    
    // Check if we died
    if (data.killedId === myPlayerId) {
      playSound('death');
      sessionStats.deaths++;
      showDeathScreen(data.killerName);
    }
  });
  
  socket.on('kill_streak', (data) => {
    showKillStreakAnnouncement(data);
  });
  
  socket.on('nuke_explosion', (data) => {
    if (data.playerId === myPlayerId) {
      showNukeAnnouncement(data.kills);
    }
  });
  
  socket.on('respawned', (data) => {
    document.getElementById('death-screen').classList.remove('show');
  });
  
  socket.on('powerup_collected', (data) => {
    playSound('powerup');
    sessionStats.powerupsCollected++;
    updateMissionProgress('powerups', 1);
    
    // Show notification
    const powerupNames = {
      'health_small': '+20 HEALTH',
      'health_medium': '+40 HEALTH',
      'health_large': '+75 HEALTH',
      'energy': '+50 XP',
      'shield': '+25 SHIELD',
      'speed': '+SPEED',
      'firerate': '+FIRE RATE',
      'damage': '+DAMAGE',
      'multishot': '+MULTISHOT',
      'maxhealth': '+MAX HEALTH',
      'triple_shot': 'TRIPLE SHOT!',
      'rapid_fire': 'RAPID FIRE!',
      'armor': '+ARMOR',
      'invincibility': 'INVINCIBILITY!',
      'mega_damage': 'MEGA DAMAGE!',
      'nuke': '💥 NUKE!'
    };
    
    const name = powerupNames[data.type] || 'POWERUP';
    showPowerupNotification(name);
  });
}

function showPowerupNotification(text) {
  const notif = document.createElement('div');
  notif.style.position = 'absolute';
  notif.style.top = '50%';
  notif.style.left = '50%';
  notif.style.transform = 'translate(-50%, -50%)';
  notif.style.color = '#00ffcc';
  notif.style.fontSize = '24px';

  setTimeout(() => notif.remove(), 1000);
}

});

});

canvas.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

canvas.addEventListener('mousedown', () => {
  shooting = true;
  // Visual feedback
  screenShake = 3;
  chromatic = 2;
});

  shooting = false;
});

// Send input to server
setInterval(() => {
  if (!socket || !myPlayerId) return;
  
  // Calculate velocity from WASD
  let vx = 0, vy = 0;
  if (keys['w'] || keys['arrowup']) vy = -1;
  if (keys['s'] || keys['arrowdown']) vy = 1;
  if (keys['a'] || keys['arrowleft']) vx = -1;
  if (keys['d'] || keys['arrowright']) vx = 1;
  
  // Normalize diagonal movement
  if (vx !== 0 && vy !== 0) {
    const len = Math.sqrt(vx*vx + vy*vy);
    vx /= len;
    vy /= len;
  }
  
  // Calculate angle to mouse
  const me = players.get(myPlayerId);
  if (me) {
    const worldMouseX = cameraX + (mouseX - W/2);
    const worldMouseY = cameraY + (mouseY - H/2);
    const angle = Math.atan2(worldMouseY - me.y, worldMouseX - me.x);
    
    socket.emit('input', { vx, vy, angle });
    
    if (shooting) {
      socket.emit('shoot', { angle });
      
      // Play shoot sound (throttled to avoid spam)
      if (!window.lastShootSound || Date.now() - window.lastShootSound > 100) {
        playSound('shoot');
        window.lastShootSound = Date.now();
      }
      
      // Create muzzle flash particles
      const shipSize = 20 + me.powerLevel * 2;
      const muzzleX = me.x + Math.cos(angle) * shipSize;
      const muzzleY = me.y + Math.sin(angle) * shipSize;
      
      for (let i = 0; i < 8; i++) {
        particles.push({
          x: muzzleX,
          y: muzzleY,
          vx: Math.cos(angle) * (Math.random() * 3 + 2) + (Math.random() - 0.5) * 2,
          vy: Math.sin(angle) * (Math.random() * 3 + 2) + (Math.random() - 0.5) * 2,
          size: Math.random() * 3 + 1,
          life: 20,
          maxLife: 20,
          color: `hsl(${(hueShift + Math.random() * 60) % 360}, 100%, ${50 + Math.random() * 30}%)`
        });
      }
    }
  }
}, 1000/60); // 60fps input

// Render
function render() {
  // Update effects
  hueShift = (hueShift + 0.5) % 360;
  screenShake = Math.max(0, screenShake * 0.9);
  chromatic = Math.max(0, chromatic * 0.92);
  
  // Clear with dark background
  ctx.fillStyle = '#04010a';
  ctx.fillRect(0, 0, W, H);
  
  // Apply screen shake
  const shakeX = (Math.random() - 0.5) * screenShake;
  const shakeY = (Math.random() - 0.5) * screenShake;
  
  ctx.save();
  ctx.translate(W/2 - cameraX + shakeX, H/2 - cameraY + shakeY);
  
  // Draw animated nebulae (trippy clouds)
  nebulae.forEach((n, i) => {
    const time = Date.now() / 1000;
    const pulse = Math.sin(time * n.pulseSpeed + i) * 0.5 + 0.5;
    const hue = (n.hue + hueShift) % 360;
    
    const gradient = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.radius);
    gradient.addColorStop(0, `hsla(${hue}, 80%, 60%, ${n.opacity * pulse})`);
    gradient.addColorStop(0.5, `hsla(${hue + 40}, 70%, 50%, ${n.opacity * 0.4 * pulse})`);
    gradient.addColorStop(1, 'transparent');
    
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
    ctx.fill();
  });
  
  // Draw animated stars
  const time = Date.now() / 1000;
  bgStars.forEach(star => {
    const twinkle = Math.sin(time * star.twinkleSpeed) * 0.5 + 0.5;
    const brightness = star.brightness * twinkle;
    ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = star.size * 3;
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });
  
  // Draw trippy grid
  drawTrippyGrid();
  
  // Draw particles (explosions, shell casings)
  particles.forEach((p, i) => {
    p.life--;
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2; // Gravity
    
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    
    if (p.life <= 0) particles.splice(i, 1);
  });
  
  // Draw powerups
  powerups.forEach(p => {
    // Color and size based on type/rarity
    const powerupStyles = {
      // Common (green)
      'health_small': { color: '#00ff66', size: 12, glow: 15 },
      'health_medium': { color: '#00ff88', size: 15, glow: 18 },
      'energy': { color: '#00ffcc', size: 10, glow: 20 },
      'shield': { color: '#00ccff', size: 14, glow: 18 },
      'xp': { color: '#66ffcc', size: 11, glow: 16 },
      
      // Uncommon (blue/cyan)
      'health_large': { color: '#00ff88', size: 20, glow: 25 },
      'speed': { color: '#00ddff', size: 16, glow: 22 },
      'firerate': { color: '#ff8800', size: 16, glow: 22 },
      'damage': { color: '#ff6600', size: 16, glow: 22 },
      'multishot': { color: '#ff00ff', size: 16, glow: 22 },
      
      // Rare (purple/gold)
      'maxhealth': { color: '#ff00aa', size: 22, glow: 30 },
      'triple_shot': { color: '#aa00ff', size: 22, glow: 30 },
      'rapid_fire': { color: '#ffaa00', size: 22, glow: 30 },
      'armor': { color: '#aaaaff', size: 22, glow: 30 },
      
      // Epic (orange/red - pulsing)
      'invincibility': { color: '#ffaa00', size: 28, glow: 40 },
      'mega_damage': { color: '#ff0066', size: 28, glow: 40 },
      'nuke': { color: '#ff0000', size: 30, glow: 50 }
    };
    
    const style = powerupStyles[p.type] || { color: '#ffffff', size: 15, glow: 20 };
    
    // Pulsing effect for epic items
    const isEpic = ['invincibility', 'mega_damage', 'nuke'].includes(p.type);
    const pulse = isEpic ? Math.sin(Date.now() / 200) * 0.3 + 1 : 1;
    const actualSize = style.size * pulse;
    
    // Outer glow
    ctx.fillStyle = style.color;
    ctx.globalAlpha = 0.2;
    ctx.beginPath();
    ctx.arc(p.x, p.y, actualSize * 2.5, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
    
    // Main orb with glow
    ctx.fillStyle = style.color;
    ctx.shadowColor = style.color;
    ctx.shadowBlur = style.glow * pulse;
    ctx.beginPath();
    ctx.arc(p.x, p.y, actualSize, 0, Math.PI*2);
    ctx.fill();
    
    // Inner highlight
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(p.x - actualSize/3, p.y - actualSize/3, actualSize/3, 0, Math.PI*2);
    ctx.fill();
    
    // Ring for rare+
    if (style.size >= 22) {
      ctx.strokeStyle = style.color;
      ctx.lineWidth = 2;
      ctx.shadowColor = style.color;
      ctx.shadowBlur = style.glow;
      ctx.beginPath();
      ctx.arc(p.x, p.y, actualSize * 1.8, 0, Math.PI*2);
      ctx.stroke();
    }
    
    ctx.shadowBlur = 0;
  });
  
  // Draw bullets with trails
  bullets.forEach(b => {
    const angle = Math.atan2(b.vy, b.vx);
    const hue = (hueShift + Math.abs(b.x + b.y) * 0.1) % 360;
    
    // Trail
    for (let i = 0; i < 5; i++) {
      const trailX = b.x - Math.cos(angle) * i * 8;
      const trailY = b.y - Math.sin(angle) * i * 8;
      const alpha = 1 - (i / 5);
      ctx.fillStyle = `hsla(${hue}, 100%, 70%, ${alpha * 0.6})`;
      ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
      ctx.shadowBlur = 20 * alpha;
      ctx.beginPath();
      ctx.arc(trailX, trailY, 4 - i, 0, Math.PI*2);
      ctx.fill();
    }
    
    // Main bullet
    ctx.fillStyle = `hsl(${hue}, 100%, 70%)`;
    ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
    ctx.shadowBlur = 25;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 5, 0, Math.PI*2);
    ctx.fill();
    
    // Inner glow
    ctx.fillStyle = '#ffffff';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 2, 0, Math.PI*2);
    ctx.fill();
    
    ctx.shadowBlur = 0;
  });
  
  // Draw player trails
  playerTrails.forEach((trail, playerId) => {
    trail.forEach((point, i) => {
      const alpha = (i / trail.length) * 0.5;
      const player = players.get(playerId);
      const isMe = playerId === myPlayerId;
      const hue = isMe ? (hueShift + 180) % 360 : (hueShift + 300) % 360;
      
      ctx.fillStyle = `hsla(${hue}, 100%, 60%, ${alpha})`;
      ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
      ctx.shadowBlur = 15 * alpha;
      ctx.beginPath();
      ctx.arc(point.x, point.y, (trail.length - i) / 3, 0, Math.PI*2);
      ctx.fill();
    });
  });
  ctx.shadowBlur = 0;
  
  // Draw players
  players.forEach((p, id) => {
    if (!p.alive) return;
    
    const isMe = id === myPlayerId;
    let color = isMe ? '#00ffcc' : '#ff2d78';
    const size = 20 + p.powerLevel * 2;
    
    // Visual effects for power states
    if (p.invincible > 0) {
      color = '#ffaa00'; // Orange for invincible
    }
    if (p.megaDamage > 0) {
      color = '#ff0066'; // Red for mega damage
    }
    
    // Shield visual
    if (p.shield > 0) {
      ctx.strokeStyle = '#00ccff';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#00ccff';
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(p.x, p.y, size + 10, 0, Math.PI*2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    
    // Ship body
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);
    
    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 20 + (p.megaDamage > 0 ? 20 : 0);
    ctx.beginPath();
    ctx.moveTo(size, 0);
    ctx.lineTo(-size/2, -size/2);
    ctx.lineTo(-size/3, 0);
    ctx.lineTo(-size/2, size/2);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    
    ctx.restore();
    
    // Name tag
    ctx.fillStyle = color;
    ctx.font = '11px Orbitron';
    ctx.textAlign = 'center';
    ctx.fillText(p.name, p.x, p.y - size - 10);
    
    // Health bar
    const barWidth = 50;
    const barHeight = 5;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(p.x - barWidth/2, p.y - size - 25, barWidth, barHeight);
    
    const healthPct = p.health / p.maxHealth;
    ctx.fillStyle = healthPct > 0.5 ? '#00ffcc' : '#ff2d78';
    ctx.fillRect(p.x - barWidth/2, p.y - size - 25, barWidth * healthPct, barHeight);
    
    // Shield bar (if present)
    if (p.shield > 0) {
      const shieldBarY = p.y - size - 30;
      ctx.fillStyle = 'rgba(0,204,255,0.3)';
      ctx.fillRect(p.x - barWidth/2, shieldBarY, barWidth, 3);
      const shieldPct = Math.min(1, p.shield / 50);
      ctx.fillStyle = '#00ccff';
      ctx.fillRect(p.x - barWidth/2, shieldBarY, barWidth * shieldPct, 3);
    }
  });
  
  ctx.restore();
  
  // Chromatic aberration effect (trippy RGB split on shooting)
  if (chromatic > 0.5) {
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = chromatic / 10;
    
    // Red channel offset
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(chromatic, 0, W, H);
    
    // Blue channel offset
    ctx.fillStyle = '#0000ff';
    ctx.fillRect(-chromatic, 0, W, H);
    
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
  }
  
  requestAnimationFrame(render);
}

function drawTrippyGrid() {
  const gridSize = 100;
  const startX = Math.floor((cameraX - W/2) / gridSize) * gridSize;
  const startY = Math.floor((cameraY - H/2) / gridSize) * gridSize;
  const endX = cameraX + W/2;
  const endY = cameraY + H/2;
  
  const time = Date.now() / 1000;
  
  ctx.lineWidth = 1;
  
  // Vertical lines with color cycling
  for (let x = startX; x < endX; x += gridSize) {
    const dist = Math.abs(x - cameraX) / 1000;
    const hue = (hueShift + dist * 60) % 360;
    const wave = Math.sin(time + x / 100) * 0.1 + 0.15;
    ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${wave})`;
    ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
    ctx.shadowBlur = 5;
    ctx.beginPath();
    ctx.moveTo(x, startY);
    ctx.lineTo(x, endY);
    ctx.stroke();
  }
  
  // Horizontal lines with color cycling
  for (let y = startY; y < endY; y += gridSize) {
    const dist = Math.abs(y - cameraY) / 1000;
    const hue = (hueShift + dist * 60 + 180) % 360;
    const wave = Math.sin(time + y / 100) * 0.1 + 0.15;
    ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${wave})`;
    ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
    ctx.shadowBlur = 5;
    ctx.beginPath();
    ctx.moveTo(startX, y);
    ctx.lineTo(endX, y);
    ctx.stroke();
  }
  
  ctx.shadowBlur = 0;
}

function updateLeaderboard() {
  const sorted = Array.from(players.values())
    .filter(p => p.alive)
    .sort((a, b) => b.score - a.score)
    .slice(0, 10);
  
  const html = sorted.map((p, i) => {
    const isMe = p.id === myPlayerId;
    return `<div class="lb-player${isMe?' me':''}">
      <span class="lb-rank">#${i+1}</span>
      <span class="lb-name">${p.name}</span>
      <span class="lb-score">${p.score}</span>
    </div>`;
  }).join('');
  
  document.getElementById('leaderboard-list').innerHTML = html;
}

function addKillMessage(data) {
  const msg = document.createElement('div');
  msg.className = 'kill-msg';
  msg.textContent = `${data.killerName} eliminated a player`;
  document.getElementById('kill-feed').appendChild(msg);
  
  setTimeout(() => msg.remove(), 3000);
}

function showDeathScreen(killerName) {
  const me = players.get(myPlayerId);
  if (!me) return;
  
  // Calculate XP earned this session
  const sessionXP = sessionStats.kills * 100 + Math.floor(sessionStats.survivalTime / 60) * 10;
  addAccountXP(sessionXP);
  
  // Update account stats
  accountData.totalKills += sessionStats.kills;
  accountData.totalDeaths++;
  accountData.bestStreak = Math.max(accountData.bestStreak, sessionStats.maxStreak);
  accountData.gamesPlayed++;
  saveAccountData();
  
  // Build enhanced death screen
  const nextUnlock = availableSkins.find(s => s.unlockLevel > accountData.level);
  const deathHTML = `
    <div style="color:#ff2d78; margin-bottom:20px;">
      <div style="font-size:18px; margin-bottom:10px;">Eliminated by ${killerName}</div>
      <div style="font-size:14px; opacity:0.8;">Score: ${me.score} • Kills: ${sessionStats.kills} • Max Streak: ${sessionStats.maxStreak}</div>
    </div>
    <div style="background:rgba(0,255,204,0.1); padding:15px; border-radius:5px; margin-bottom:15px;">
      <div style="font-size:12px; color:rgba(0,255,204,0.6); margin-bottom:10px;">SESSION REWARDS</div>
      <div style="font-size:16px; color:#00ffcc; margin-bottom:5px;">+${sessionXP} XP</div>
      <div style="font-size:11px; color:rgba(0,255,204,0.7);">Account Level ${accountData.level} • ${accountData.xp}/${accountData.level * 1000} XP</div>
    </div>
    ${nextUnlock ? `<div style="font-size:11px; color:#ffaa00; margin-bottom:15px;">
      ✨ Next unlock: ${nextUnlock.name} at Level ${nextUnlock.unlockLevel}
    </div>` : ''}
    <div style="font-size:10px; color:rgba(255,45,120,0.6);">Total Games: ${accountData.gamesPlayed} • Best Streak: ${accountData.bestStreak}</div>
  `;
  
  document.getElementById('death-stats-text').innerHTML = deathHTML;
  document.getElementById('death-screen').classList.add('show');
  
  // Reset session stats
  sessionStats = { kills: 0, deaths: 0, powerupsCollected: 0, survivalTime: 0, maxStreak: 0 };
}

function showKillStreakAnnouncement(data) {
  const streakEl = document.getElementById('kill-streak-announcement');
  const titleEl = document.getElementById('streak-title');
  const subtitleEl = document.getElementById('streak-subtitle');
  
  const colors = {
    3: '#ff6600',
    5: '#ffaa00',
    7: '#ff00aa',
    10: '#ff0066'
  };
  
  const color = colors[data.streak] || '#ff6600';
  
  titleEl.textContent = data.title;
  titleEl.style.color = color;
  subtitleEl.textContent = data.playerName;
  subtitleEl.style.color = color;
  
  streakEl.style.display = 'block';
  playSound('streak');
  
  setTimeout(() => {
    streakEl.style.display = 'none';
  }, 2000);
}

function showNukeAnnouncement(kills) {
  const notif = document.createElement('div');
  notif.style.cssText = 'position:absolute; top:35%; left:50%; transform:translate(-50%,-50%); z-index:200; text-align:center; animation:nukeBlast 1.5s ease forwards;';
  notif.innerHTML = `
    <div style="font-size:72px; font-weight:900; color:#ff0000; text-shadow:0 0 80px #ff0000; margin-bottom:15px;">💥 NUKE!</div>
    <div style="font-size:32px; color:#ffaa00; text-shadow:0 0 40px #ffaa00;">${kills} KILLS!</div>
  `;
  document.body.appendChild(notif);
  playSound('streak');
  setTimeout(() => notif.remove(), 1500);
}

document.getElementById('respawn-btn').addEventListener('click', () => {
  if (socket) {
    socket.emit('respawn');
  }
});

render();
